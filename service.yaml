apiVersion: v1
kind: Service
metadata:
  name: willow-api-service
spec:
  selector:
    app: willow-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: willow-web-service
spec:
  selector:
    app: willow-web
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: LoadBalancer
