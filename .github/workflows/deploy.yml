name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ace-course-web-app-497605
  API_IMAGE: gcr.io/ace-course-web-app-497605/willow-api
  WEB_IMAGE: gcr.io/ace-course-web-app-497605/willow-web

jobs:
  deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            api/pnpm-lock.yaml
            web/pnpm-lock.yaml

      - name: Install API dependencies
        working-directory: api
        run: pnpm install --frozen-lockfile

      - name: Test API
        working-directory: api
        run: pnpm test

      - name: Build API
        working-directory: api
        run: pnpm build

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Lint web
        working-directory: web
        run: pnpm lint

      - name: Build web
        working-directory: web
        run: pnpm build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build and push API image
        run: |
          docker build \
            --tag "${API_IMAGE}:${GITHUB_SHA}" \
            --tag "${API_IMAGE}:latest" \
            ./api
          docker push "${API_IMAGE}:${GITHUB_SHA}"
          docker push "${API_IMAGE}:latest"

      - name: Build and push web image
        run: |
          docker build \
            --tag "${WEB_IMAGE}:${GITHUB_SHA}" \
            --tag "${WEB_IMAGE}:latest" \
            ./web
          docker push "${WEB_IMAGE}:${GITHUB_SHA}"
          docker push "${WEB_IMAGE}:latest"

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: ${{ secrets.GKE_LOCATION }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f deployment.yaml
          kubectl apply -f service.yaml
          kubectl set image deployment/willow-api willow-api="${API_IMAGE}:${GITHUB_SHA}"
          kubectl set image deployment/willow-web willow-web="${WEB_IMAGE}:${GITHUB_SHA}"
          kubectl rollout status deployment/willow-api
          kubectl rollout status deployment/willow-web
