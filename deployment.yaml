apiVersion: apps/v1
kind: Deployment
metadata:
  name: willow-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: willow-api
  template:
    metadata:
      labels:
        app: willow-api
    spec:
      containers:
      - name: willow-api
        image: us-central1-docker.pkg.dev/ace-course-web-app-497605/willow-images/willow-api:latest
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: willow-db-secret
              key: database-url